[project]
name = "wherewolf"
version = "0.1.0"
requires-python = ">=3.11"

[tool.uv]
cache-dir = "/tmp/wherewolf/.uv_cache"

[tool.ruff]
line-length = 100
cache-dir = "/tmp/wherewolf/.ruff_cache"

[tool.pytest.ini_options]
addopts = "--cov=src --cov-report=term"
cache_dir = "/tmp/wherewolf/.pytest_cache"

[tool.coverage.run]
data_file = "/tmp/wherewolf/.coverage"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
]
